name: Main PR Source

on:
  pull_request:
    branches:
      - main

jobs:
  require-dev-source:
    runs-on: ubuntu-latest
    steps:
      - name: Require dev branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Pull requests into main must come from the dev branch."
            exit 1
          fi
